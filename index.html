function applySuffixes(text){return text.replace(/[A-Za-zÀ-ÖØ-öø-ÿ]+(?:['’\-][A-Za-zÀ-ÖØ-öø-ÿ]+)*/g,function(w,off,full){return transform(w,off,full)})}
function clean(text){return text.replace(/\bde ellui\b/gi,"d’ellui").replace(/\bde elleux\b/gi,"d’elleux").replace(/\bd['’]ellui\b/gi,"d’ellui").replace(/\bd['’]elleux\b/gi,"d’elleux").replace(/\bque iels\b/gi,"qu’iels").replace(/\bque iel\b/gi,"qu’iel").replace(/\bsi iels\b/gi,"s’iels").replace(/\bsi iel\b/gi,"s’iel")}
function generate(){var i=$("incInput"),o=$("incOutput"),im=i.scrollHeight-i.clientHeight,ratio=im>0?i.scrollTop/im:0,text=i.value;text=applyCompound(text);text=applyPronouns(text);text=applySuffixes(text);text=clean(text);o.value=text;requestAnimationFrame(function(){var om=o.scrollHeight-o.clientHeight;o.scrollTop=om*ratio});$("incStatus").textContent="Texte généré."}
function copyOutput(){var o=$("incOutput");o.focus();o.select();if(navigator.clipboard)navigator.clipboard.writeText(o.value).then(function(){$("incStatus").textContent="Texte copié."});else{document.execCommand("copy");$("incStatus").textContent="Texte copié."}}function clearAll(){$("incInput").value="";$("incOutput").value="";$("incStatus").textContent="Texte vidé."}
var syncing=false;function syncScroll(a,b){if(syncing)return;syncing=true;var am=a.scrollHeight-a.clientHeight,bm=b.scrollHeight-b.clientHeight,ratio=am>0?a.scrollTop/am:0;b.scrollTop=bm*ratio;b.scrollLeft=a.scrollLeft;requestAnimationFrame(function(){syncing=false})}
