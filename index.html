<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Générateur inclusif</title>
<link rel="stylesheet" href="assets/style.css">

<div id="incGen">
  <div class="inc-card">
    <h2>Générateur inclusif</h2>

    <div class="inc-optionsWrap">
      <div class="inc-optionsHead">
        <div class="inc-optionsTitle">Options</div>
        <div class="inc-optionsHint">Ciblé ou global</div>
      </div>

      <div class="inc-options">
        <label class="inc-opt">
          <input type="checkbox" id="incIl" checked>
          <span>Il → iel</span>
        </label>

        <label class="inc-opt">
          <input type="checkbox" id="incElle" checked>
          <span>Elle → iel</span>
        </label>

        <label class="inc-opt">
          <input type="checkbox" id="incAllPronouns">
          <span>Tous les pronoms</span>
        </label>

        <label class="inc-opt inc-optNeutral">
          <input type="checkbox" id="incNeutral">
          <span>Neutralité</span>
        </label>
      </div>

      <div class="inc-dynamicDesc" id="incOptionDesc">
        <strong>Conversion ciblée :</strong> les formes liées à il et elle seront inclusivisées.
      </div>
    </div>

    <div class="inc-grid">
      <label>Texte original
        <textarea id="incInput" placeholder="Tapez votre texte ici ou collez-le directement."></textarea>
      </label>

      <label>Texte inclusif
        <textarea id="incOutput" readonly></textarea>
      </label>
    </div>

    <div class="inc-actions">
      <button type="button" id="incGenerate">Générer</button>
      <button type="button" id="incCopy">Copier</button>
      <button type="button" id="incClear">Vider</button>
    </div>

    <div id="incStatus">Chargement des dictionnaires…</div>
  </div>
</div>

<script src="assets/generateur.js"></script>
